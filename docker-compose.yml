services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: translations
      DB_USERNAME: translations
      DB_PASSWORD: secret
      CACHE_STORE: database
      SESSION_DRIVER: database
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: translations
      MYSQL_USER: translations
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
  vendor: